<!DOCTYPE html>
<html>
<head><title>Generate Neuralix Icons</title></head>
<body>
<p>Clic droit sur chaque image → "Enregistrer l'image sous..." dans le dossier <b>icons/</b></p>

<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>

<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>

<script>
function drawIcon(canvas) {
    const s = canvas.width;
    const ctx = canvas.getContext('2d');

    // Fond arrondi
    const r = s * 0.15;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
    ctx.quadraticCurveTo(s, 0, s, r);
    ctx.lineTo(s, s - r);
    ctx.quadraticCurveTo(s, s, s - r, s);
    ctx.lineTo(r, s);
    ctx.quadraticCurveTo(0, s, 0, s - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#1a1d23';
    ctx.fill();

    // Onde sinusoïdale (EEG stylisé)
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = s * 0.025;
    ctx.lineCap = 'round';
    ctx.beginPath();
    const cy = s * 0.5;
    const amp = s * 0.15;
    for (let x = s * 0.15; x <= s * 0.85; x++) {
        const t = (x - s * 0.15) / (s * 0.7);
        const y = cy + Math.sin(t * Math.PI * 4) * amp * (1 - 0.3 * Math.sin(t * Math.PI));
        if (x === Math.floor(s * 0.15)) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Texte "N"
    ctx.fillStyle = '#3b82f6';
    ctx.font = `bold ${s * 0.28}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', s * 0.5, s * 0.28);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
